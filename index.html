<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> hii ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sparkles" id="sparkles" aria-hidden="true"></div>

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-inner">
      <button class="hdr-menu" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="hdr-brand">
        <svg class="hdr-mascot" viewBox="0 0 200 240"><ellipse cx="100" cy="115" rx="68" ry="80" fill="#6B3A5A"/><ellipse cx="100" cy="110" rx="58" ry="70" fill="#8B5A7B"/><path d="M58 78 Q65 55 85 62 Q90 48 100 50 Q110 48 115 62 Q135 55 142 78 Q140 72 130 75 Q120 58 100 55 Q80 58 70 75 Q60 72 58 78Z" fill="#6B3A5A"/><ellipse cx="100" cy="120" rx="45" ry="48" fill="#FFE8E0"/><ellipse cx="72" cy="132" rx="14" ry="8" fill="#FFB5B5" opacity="0.6"/><ellipse cx="128" cy="132" rx="14" ry="8" fill="#FFB5B5" opacity="0.6"/><path d="M75 112 Q82 102 89 112" stroke="#4A2A3A" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M111 112 Q118 102 125 112" stroke="#4A2A3A" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M93 140 Q100 148 107 140" stroke="#E8737A" stroke-width="2.5" fill="none" stroke-linecap="round"/><ellipse cx="90" cy="65" rx="16" ry="10" fill="#FF7B9C" transform="rotate(-20 90 65)"/><ellipse cx="110" cy="65" rx="16" ry="10" fill="#FF7B9C" transform="rotate(20 110 65)"/><ellipse cx="100" cy="68" rx="6" ry="5" fill="#FF4777"/><rect x="88" y="162" width="24" height="12" rx="6" fill="#FFE8E0"/><path d="M70 172 Q68 200 55 228 L145 228 Q132 200 130 172 Z" fill="#FF9EBB"/><circle cx="100" cy="195" r="4" fill="#FF4777"/><path d="M96 195 L86 188" stroke="#FF4777" stroke-width="2" stroke-linecap="round"/><path d="M104 195 L114 188" stroke="#FF4777" stroke-width="2" stroke-linecap="round"/></svg>
        <h1 class="hdr-title">Cutie Menu <span class="spin">✨</span></h1>
      </div>
      <p class="hdr-sub">Sweet picks, pink clicks 🩷</p>
    </div>
  </header>

  <!-- Body: sidebar + content -->
  <div class="body">
    <!-- Desktop sidebar (always visible on desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">🌸 Menu</div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" class="search-input" placeholder="Search menu..." autocomplete="off">
        <span class="search-icon" id="searchClear" title="Clear">✕</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- skeleton -->
      </nav>
    </aside>

    <!-- Content area -->
    <main class="content" id="content">
      <!-- Error -->
      <div class="state hidden" id="errorBox">
        <span class="state-emoji">😿</span>
        <h2>Oopsie!</h2>
        <p id="errorMsg">Something went wrong</p>
        <button class="btn-retry" id="retryBtn">Try Again ♡</button>
      </div>

      <!-- Detail panel -->
      <div class="detail" id="detail">
        <div class="detail-empty" id="detailEmpty">
          <span class="empty-icon">🎀</span>
          <h2>Pick something cute!</h2>
          <p>Select an item from the sidebar to view its content~</p>
        </div>
        <div class="detail-card hidden" id="detailCard">
          <h2 class="detail-title" id="detailTitle"></h2>
          <div class="detail-body" id="detailBody"></div>
          <button class="copy-btn" id="copyBtn"> Copy</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile overlay + sidebar -->
  <div class="m-overlay hidden" id="mOverlay"></div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
